<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>window.dataVersion = '20260501_1112';</script>
    <title>客服清洗数据看板 - CC+钉钉整合</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <script>if(typeof echarts==='undefined'){document.write('<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"><\/script>');}</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1e293b 50%, #0f172a 100%);
            color: #f8fafc;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 30%, #db2777 70%, #f43f5e 100%);
            padding: 44px 40px;
            border-radius: 22px;
            margin-bottom: 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(79,70,229,0.3), 0 0 80px rgba(219,39,119,0.15);
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.08) 0%, transparent 40%);
            animation: headerGlow 8s ease-in-out infinite alternate;
        }
        .header h1 {
            font-size: 38px;
            margin-bottom: 10px;
            position: relative;
            letter-spacing: 1px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .header p {
            opacity: 0.92;
            position: relative;
            font-size: 15px;
            letter-spacing: 1px;
        }
        
        .filter-bar {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(12px);
            padding: 20px 24px;
            border-radius: 18px;
            margin-bottom: 26px;
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 2px 16px rgba(0,0,0,0.12);
        }
        .filter-item { display: flex; align-items: center; gap: 8px; }
        .filter-item label { color: #94a3b8; font-size: 14px; }
        select, input[type="date"] {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
        }
        select option {
            background: #1e293b;
            color: #fff;
            padding: 8px;
            font-size: 14px;
        }
        select {
            min-width: 140px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 36px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.18);
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3.5px;
            border-radius: 18px 18px 0 0;
        }
        .stat-card.total::after { background: linear-gradient(90deg, #60a5fa, #3b82f6, #818cf8); box-shadow: 0 0 12px rgba(96,165,250,0.5); }
        .stat-card.clean::after { background: linear-gradient(90deg, #f472b6, #ec4899, #f43f5e); box-shadow: 0 0 12px rgba(244,114,182,0.4); }
        .stat-card.valid::after { background: linear-gradient(90deg, #34d399, #10b981, #059669); box-shadow: 0 0 12px rgba(52,211,153,0.45); }
        .stat-card.rate::after { background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706); box-shadow: 0 0 12px rgba(251,191,36,0.45); }
        .stat-card.kezi::after { background: linear-gradient(90deg, #a78bfa, #8b5cf6, #7c3aed); box-shadow: 0 0 12px rgba(167,139,250,0.45); }
        .stat-card h3 {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-breakdown {
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.5;
        }
        .stat-breakdown span.cc-tag { color: #60a5fa; }
        .stat-breakdown span.dd-tag { color: #34d399; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }
        .chart-container {
            background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            padding: 22px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            height: 380px;
            transition: all 0.3s ease;
        }
        .chart-container:hover {
            border-color: rgba(99,102,241,0.2);
            box-shadow: 0 8px 28px rgba(0,0,0,0.2);
        }
        .chart-container.full-width {
            grid-column: 1 / -1;
            height: 420px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-content {
            height: calc(100% - 35px);
        }
        
        .detail-section {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 26px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
        }
        .detail-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .brand-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .brand-card h4 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #fff;
        }
        .brand-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .brand-stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .brand-stat-label { color: #94a3b8; }
        .brand-stat-value { color: #fff; font-weight: 600; }
        
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0; display: block; overflow-x: auto; white-space: nowrap; }
        .data-table th, .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .data-table th {
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0; display: block; overflow-x: auto; white-space: nowrap; }
        .data-table td { color: #f8fafc; }
        .data-table tr:hover { background: rgba(255,255,255,0.03); }

        /* 客服工作量排行 - 卡片式布局（美化版） */
        .visitor-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }
        .visitor-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 18px;
            padding: 22px 24px;
            border: 1px solid rgba(255,255,255,0.09);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .visitor-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.35);
            border-color: rgba(99,102,241,0.25);
        }
        .visitor-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa);
            opacity: 0.8;
        }
        /* 前三名特殊光效 */
        .visitor-card.rank-1::before { background: linear-gradient(90deg, #fbbf24, #f59e0b, #d97706); opacity: 1; height: 4px;}
        .visitor-card.rank-2::before { background: linear-gradient(90deg, #94a3b8, #64748b, #475569); opacity: 1; height: 4px;}
        .visitor-card.rank-3::before { background: linear-gradient(90deg, #cd7c2f, #a16207, #854d0e); opacity: 1; height: 4px;}

        .visitor-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .visitor-rank {
            width: 38px; height: 38px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 17px;
            color: #0f172a;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .visitor-name {
            font-size: 19px; font-weight: 700; color: #fff;
            letter-spacing: 0.5px;
        }

        .visitor-types {
            display: flex; flex-direction: column; gap: 9px;
        }
        .type-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 11px 15px;
            border-radius: 11px;
            transition: all 0.2s ease;
        }
        .type-row:hover { transform: translateX(3px); filter: brightness(1.1); }
        .type-row.card { background: rgba(16,185,129,0.08); border-left: 3.5px solid #34d399; }
        .type-row.jx { background: rgba(245,158,11,0.08); border-left: 3.5px solid #fbbf24; }
        .type-row.other { background: rgba(100,116,139,0.12); border-left: 3.5px solid #94a3b8; }
        /* 汇总卡片特殊样式 */
        .summary-total-card {
            grid-column: 1 / -1;  /* 占满整行 */
            background: linear-gradient(145deg, rgba(99,102,241,0.1) 0%, rgba(139,92,246,0.04) 100%);
            border: 1.5px solid rgba(99,102,241,0.25);
        }
        .summary-total-card::before {
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #a78bfa) !important;
        }
        .type-label { font-size: 13px; color: #cbd5e1; min-width: 90px; font-weight: 500; }
        .type-stats { font-size: 14px; color: #cbd5e1; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .type-stats b { color: #fff; font-size: 15px; font-weight: 600; }
        .type-rate {
            font-size: 14px; font-weight: 700; margin-left: 8px;
            padding: 2px 8px; border-radius: 6px;
            min-width: 52px; text-align: center; display: inline-block;
        }
        .type-row.card .type-rate { background: rgba(16,185,129,0.15); color: #34d399; }
        .type-row.jx .type-rate { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .type-row.other .type-rate { background: rgba(100,116,139,0.2); color: #94a3b8; }

        .visitor-summary-bar {
            display: flex; align-items: center; gap: 18px;
            padding: 12px 16px;
            margin-bottom: 14px;
            background: linear-gradient(90deg, rgba(99,102,241,0.08) 0%, rgba(139,92,246,0.05) 100%);
            border-radius: 12px;
            border: 1px solid rgba(99,102,241,0.12);
            font-size: 14px;
        }
        .sum-item { color: #94a3b8; letter-spacing: 0.3px; }
        .sum-item b { color: #e2e8f0; font-size: 16px; font-weight: 600; }
        .sum-item:nth-child(1) b { color: #60a5fa; }   /* 电话蓝色 */
        .sum-item:nth-child(3) b { color: #34d399; }   /* 有效绿色 */
        .sum-rate {
            font-size: 21px; font-weight: 800;
            color: #34d399;
            margin-left: auto;
            text-shadow: 0 0 20px rgba(52,211,153,0.3);
            padding: 3px 12px;
            background: rgba(52,211,153,0.08);
            border-radius: 8px;
        }

        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .brand-grid { grid-template-columns: repeat(2, 1fr); }
            .visitor-cards { grid-template-columns: 1fr; }
        }

        @keyframes headerGlow {
            from { transform: translate(0, 0); }
            to { transform: translate(2%, -2%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 客服清洗数据看板</h1>
        <p>CC系统 + 钉钉跟进 | 品牌×客资类型交叉分析</p>
    </div>

    <div class="filter-bar">
        <div class="filter-item">
            <label>开始日期</label>
            <input type="date" id="startDate" onchange="applyFilter()">
        </div>
        <div class="filter-item">
            <label>结束日期</label>
            <input type="date" id="endDate" onchange="applyFilter()">
        </div>
        <div class="filter-item">
            <label>品牌筛选</label>
            <select id="brandFilter" onchange="applyFilter()">
                <option value="all">全部品牌</option>
                <option value="美的">美的</option>
                <option value="小天鹅">小天鹅</option>
                <option value="COLMO">COLMO</option>
                <option value="东芝">东芝</option>
            </select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card kezi">
            <h3>📋 客资量</h3>
            <div class="stat-value" id="keziCount">-</div>
        </div>
        <div class="stat-card total">
            <h3>📞 总电话量</h3>
            <div class="stat-value" id="totalCalls">-</div>
            <div class="stat-breakdown" id="totalCallsBreakdown"></div>
        </div>
        <div class="stat-card clean">
            <h3>🧹 清洗量</h3>
            <div class="stat-value" id="cleanCount">-</div>
            <div class="stat-breakdown" id="cleanCountBreakdown"></div>
        </div>
        <div class="stat-card valid">
            <h3>✅ 有效量</h3>
            <div class="stat-value" id="validCount">-</div>
            <div class="stat-breakdown" id="validCountBreakdown"></div>
        </div>
        <div class="stat-card rate">
            <h3>📈 有效率</h3>
            <div class="stat-value" id="validRate">-</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container full-width">
            <div class="chart-title">📈 数据趋势分析</div>
            <div class="chart-content" id="trendChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">🏷️ 品牌分布</div>
            <div class="chart-content" id="brandChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">📋 客资类型分布</div>
            <div class="chart-content" id="customerTypeChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">📊 品牌×客资类型热力图</div>
            <div class="chart-content" id="heatmapChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">⚡ 客服处理量 TOP10</div>
            <div class="chart-content" id="visitorChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">🔀 CC vs 钉钉双渠道对比</div>
            <div class="chart-content" id="channelChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">🔽 外呼状态漏斗</div>
            <div class="chart-content" id="funnelChart"></div>
        </div>
        <div class="chart-container full-width">
            <div class="chart-title">📈 品牌清洗量趋势</div>
            <div class="chart-content" id="brandTrendChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">📊 客服客资类型构成</div>
            <div class="chart-content" id="visitorTypeChart"></div>
        </div>
        <div class="chart-container">
            <div class="chart-title">📉 清洗量/有效量双轴趋势</div>
            <div class="chart-content" id="dualAxisChart"></div>
        </div>
    </div>

    <div class="detail-section">
        <div class="detail-title"><span>🏢</span> 各品牌客资明细</div>
        <div class="brand-grid" id="brandDetailGrid"></div>
    </div>

    <div class="detail-section">
        <div class="detail-title"><span>👥</span> 客服工作量排行 TOP20</div>
        <div id="visitorTable"></div>
    </div>

                    });
                    
                    // 客资类型分布
                    Object.entries(day['客资类型分布']).forEach(([type, count]) => {
                        summary.customer_type_distribution[type] = (summary.customer_type_distribution[type] || 0) + count;
                    });
                    
                    // 外呼状态
                    Object.entries(day['外呼状态'] || {}).forEach(([status, count]) => {
                        summary.call_status[status] = (summary.call_status[status] || 0) + count;
                    });

                    // 回访人统计
                    Object.entries(day['回访人统计']).forEach(([visitor, count]) => {
                        summary.visitor_stats[visitor] = (summary.visitor_stats[visitor] || 0) + count;
                    });
                    
                    // 回访人维度：电话量/清洗量/有效量
                    Object.entries(day['回访人_电话量'] || {}).forEach(([visitor, count]) => {
                        summary.visitor_calls[visitor] = (summary.visitor_calls[visitor] || 0) + count;
                    });
                    Object.entries(day['回访人_清洗量'] || {}).forEach(([visitor, count]) => {
                        summary.visitor_clean[visitor] = (summary.visitor_clean[visitor] || 0) + count;
                    });
                    Object.entries(day['回访人_有效量'] || {}).forEach(([visitor, count]) => {
                        summary.visitor_valid[visitor] = (summary.visitor_valid[visitor] || 0) + count;
                    });
                    
                    // 回访人维度：按客资类型拆分（从JSON字段直接取）
                    ['客服卡片', '家享联盟', '智投线索通', '其他'].forEach(function(type) {
                        // 按类型电话量
                        var tc = day['回访人_类型_电话量'] || {};
                        Object.entries(tc).forEach(([v, c]) => {
                            if (!summary.visitor_type_detail[v]) { summary.visitor_type_detail[v] = {'客服卡片': 0, '家享联盟': 0, '智投线索通': 0, '其他': 0}; }
                            if (c && typeof c === 'object') { summary.visitor_type_detail[v][type] += (c[type] || 0); }
                            else { summary.visitor_type_detail[v]['客服卡片'] += c || 0; }  // fallback
                        });
                        // 按类型清洗量
                        var cl = day['回访人_类型_清洗量'] || {};
                        Object.entries(cl).forEach(([v, c]) => {
                            if (!summary.visitor_type_clean[v]) { summary.visitor_type_clean[v] = {'客服卡片': 0, '家享联盟': 0, '智投线索通': 0, '其他': 0}; }
                            if (c && typeof c === 'object') { summary.visitor_type_clean[v][type] += (c[type] || 0); }
                            else { summary.visitor_type_clean[v]['客服卡片'] += c || 0; }
                        });
                        // 按类型有效量
                        var vl = day['回访人_类型_有效量'] || {};
                        Object.entries(vl).forEach(([v, c]) => {
                            if (!summary.visitor_type_valid[v]) { summary.visitor_type_valid[v] = {'客服卡片': 0, '家享联盟': 0, '智投线索通': 0, '其他': 0}; }
                            if (c && typeof c === 'object') { summary.visitor_type_valid[v][type] += (c[type] || 0); }
                            else { summary.visitor_type_valid[v]['客服卡片'] += c || 0; }
                        });
                    });
                    
                    // 品牌客资交叉
                    Object.entries(day['品牌客资交叉']).forEach(([brand, types]) => {
                        if (!summary.brand_customer_cross[brand]) {
                            summary.brand_customer_cross[brand] = {};
                        }
                        Object.entries(types).forEach(([type, count]) => {
                            summary.brand_customer_cross[brand][type] = (summary.brand_customer_cross[brand][type] || 0) + count;
                        });
                    });
                } else {
                    // 按品牌筛选：只取该品牌的数据
                    const brandDist = day['品牌分布_钉钉'] || {};
                    const ccBrandDist = day['品牌分布_CC'] || {};
                    const ddBrandDist = day['品牌分布_钉钉'] || {};
                    const crossCC = day['品牌客资交叉_CC'] || {};
                    const crossDD = day['品牌客资交叉_钉钉'] || {};
                    const visitorCC = day['回访人统计_CC'] || {};
                    const visitorDD = day['回访人统计_钉钉'] || {};

                    // 该品牌的客资量（从每日留资表的品牌明细中取值）
                    const keziBrand = day['客资量_品牌'] || {};
                    summary.kezi_count += (keziBrand[brandFilter] || 0);

                    // 该品牌的电话量
                    summary.total_calls += (ccBrandDist[brandFilter] || 0) + (ddBrandDist[brandFilter] || 0);
                    summary.total_calls_cc += ccBrandDist[brandFilter] || 0;
                    summary.total_calls_dd += ddBrandDist[brandFilter] || 0;

                    // 清洗量：直接从后端字段取值（精确）
                    summary.clean_count += (day['品牌清洗量'] || {})[brandFilter] || 0;
                    summary.clean_count_cc += (day['品牌清洗量_CC'] || {})[brandFilter] || 0;
                    summary.clean_count_dd += (day['品牌清洗量_钉钉'] || {})[brandFilter] || 0;

                    // 有效量：直接从后端字段取值（精确）
                    summary.valid_count += (day['品牌有效量'] || {})[brandFilter] || 0;
                    summary.valid_count_cc += (day['品牌有效量_CC'] || {})[brandFilter] || 0;
                    summary.valid_count_dd += (day['品牌有效量_钉钉'] || {})[brandFilter] || 0;

                    // 品牌分布（只有选中的品牌）
                    summary.brand_distribution[brandFilter] = (summary.brand_distribution[brandFilter] || 0)
                        + (ccBrandDist[brandFilter] || 0) + (ddBrandDist[brandFilter] || 0);
                    
                    // 客资类型分布（只取选中品牌的）
                    if (crossCC[brandFilter]) {
                        Object.entries(crossCC[brandFilter]).forEach(([type, count]) => {
                            summary.customer_type_distribution[type] = (summary.customer_type_distribution[type] || 0) + count;
                        });
                    }
                    if (crossDD[brandFilter]) {
                        Object.entries(crossDD[brandFilter]).forEach(([type, count]) => {
                            summary.customer_type_distribution[type] = (summary.customer_type_distribution[type] || 0) + count;
                        });
                    }

                    // 回访人统计：从三维交叉表按品牌汇总（替代原来用全品牌回访人统计_CC/钉钉的bug）
                    var vbtForStats = day['回访人_品牌_类型'] || {};
                    Object.entries(vbtForStats).forEach(([visitor, brands_data]) => {
                        if (brands_data[brandFilter]) {
                            var btStat = brands_data[brandFilter];
                            var statTotal = Object.values(btStat).reduce(function(a,b){return a+b;}, 0);
                            summary.visitor_stats[visitor] = (summary.visitor_stats[visitor] || 0) + statTotal;
                        }
                    });

                    // 品牌筛选时：从三维交叉表汇总每个人的电话量/清洗量/有效量
                    var vbt_calls = day['回访人_品牌_类型'] || {};
                    var vbt_clean = day['回访人_品牌_类型_清洗量'] || {};
                    var vbt_valid = day['回访人_品牌_类型_有效量'] || {};

                    Object.entries(vbt_calls).forEach(([visitor, brands_data]) => {
                        if (brands_data[brandFilter]) {
                            var bt = brands_data[brandFilter];
                            // 电话量
                            var pTotal = Object.values(bt).reduce(function(a,b){return a+b;}, 0);
                            summary.visitor_calls[visitor] = (summary.visitor_calls[visitor] || 0) + pTotal;

                            // 按客资类型拆分（电话量）
                            if (!summary.visitor_type_detail[visitor]) { summary.visitor_type_detail[visitor] = {'客服卡片': 0, '家享联盟': 0, '智投线索通': 0, '其他': 0}; }
                            ['客服卡片', '家享联盟', '智投线索通', '其他'].forEach(function(t) {
                                summary.visitor_type_detail[visitor][t] += (bt[t] || 0);
                            });
                        }
                    });

                    // 清洗量（从三维交叉表精确取值）
                    Object.entries(vbt_clean).forEach(([visitor, brands_data]) => {
                        if (brands_data[brandFilter]) {
                            var btC = brands_data[brandFilter];
                            var cTotal = Object.values(btC).reduce(function(a,b){return a+b;}, 0);
                            summary.visitor_clean[visitor] = (summary.visitor_clean[visitor] || 0) + cTotal;

                            if (!summary.visitor_type_clean[visitor]) { summary.visitor_type_clean[visitor] = {'客服卡片': 0, '家享联盟': 0, '智投线索通': 0, '其他': 0}; }
                            ['客服卡片', '家享联盟', '智投线索通', '其他'].forEach(function(t) {
                                summary.visitor_type_clean[visitor][t] += (btC[t] || 0);
                            });
                        }
                    });

                    // 有效量（从三维交叉表精确取值）
                    Object.entries(vbt_valid).forEach(([visitor, brands_data]) => {
                        if (brands_data[brandFilter]) {
                            var btV = brands_data[brandFilter];
                            var vTotal = Object.values(btV).reduce(function(a,b){return a+b;}, 0);
                            summary.visitor_valid[visitor] = (summary.visitor_valid[visitor] || 0) + vTotal;

                            if (!summary.visitor_type_valid[visitor]) { summary.visitor_type_valid[visitor] = {'客服卡片': 0, '家享联盟': 0, '智投线索通': 0, '其他': 0}; }
                            ['客服卡片', '家享联盟', '智投线索通', '其他'].forEach(function(t) {
                                summary.visitor_type_valid[visitor][t] += (btV[t] || 0);
                            });
                        }
                    });

                    // 品牌客资交叉
                    if (!summary.brand_customer_cross[brandFilter]) {
                        summary.brand_customer_cross[brandFilter] = {'客服卡片': 0, '家享联盟': 0, '智投线索通': 0, '其他': 0};
                    }
                    if (crossCC[brandFilter]) {
                        Object.entries(crossCC[brandFilter]).forEach(([type, count]) => {
                            summary.brand_customer_cross[brandFilter][type] =
                                (summary.brand_customer_cross[brandFilter][type] || 0) + count;
                        });
                    }
                    if (crossDD[brandFilter]) {
                        Object.entries(crossDD[brandFilter]).forEach(([type, count]) => {
                            summary.brand_customer_cross[brandFilter][type] =
                                (summary.brand_customer_cross[brandFilter][type] || 0) + count;
                        });
                    }
                }
            });
            
            summary.valid_rate = summary.clean_count > 0 ? (summary.valid_count / summary.clean_count * 100).toFixed(1) : 0;
            
            return summary;
        }

            var brandNames = ['美的', '小天鹅', 'COLMO', '东芝'];
            var brandTrendColors = [['#818cf8','#4f46e5'], ['#34d399','#10b981'], ['#fbbf24','#f59e0b'], ['#f472b6','#ec4899']];
            var brandTrendSeries = brandNames.map(function(brand, idx) {
                var cleanData = summary.daily_data.map(function(day) {
                    var crossCC = (day['品牌客资交叉_CC'] || {})[brand] || {};
                    var crossDD = (day['品牌客资交叉_钉钉'] || {})[brand] || {};
                    var total = Object.values(crossCC).reduce(function(a,b){return a+b;},0) + Object.values(crossDD).reduce(function(a,b){return a+b;},0);
                    return total;
                });
                return {
                    name: brand, type: 'line', smooth: true, symbol: 'circle', symbolSize: 6,
                    lineStyle: { width: 2.5, color: brandTrendColors[idx][0] },
                    itemStyle: { color: brandTrendColors[idx][0] },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: brandTrendColors[idx][0] + '40'},
                            {offset: 1, color: brandTrendColors[idx][1] + '05'}
                        ])
                    },
                    data: cleanData
                };
            });
            brandTrendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: brandNames, top: 5, textStyle: { color: '#94a3b8' } },
                grid: { left: '3%', right: '4%', bottom: '3%', top: 40, containLabel: true },
                xAxis: { type: 'category', data: summary.daily_data.map(function(d){return d['日期'].substring(5);}), axisLabel: { color: '#94a3b8', rotate: 30 } },
                yAxis: { type: 'value', name: '清洗量', axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
                series: brandTrendSeries
            });

            // ===== 图表9: 客服客资类型堆叠柱状图 =====
            var visitorNames = Object.keys(summary.visitor_type_detail);
            visitorNames.sort(function(a,b){ return (summary.visitor_calls[b]||0) - (summary.visitor_calls[a]||0); });
            var typeNames = ['客服卡片', '家享联盟', '智投线索通', '其他'];
            var stackColors = ['#818cf8', '#34d399', '#fbbf24', '#f472b6'];
            var stackSeries = typeNames.map(function(t, idx) {
                return {
                    name: t, type: 'bar', stack: 'total', barWidth: '40%',
                    data: visitorNames.map(function(v) { return (summary.visitor_type_detail[v] || {})[t] || 0; }),
                    itemStyle: { color: stackColors[idx], borderRadius: idx === typeNames.length - 1 ? [4,4,0,0] : [0,0,0,0] },
                    emphasis: { focus: 'series' }
                };
            });
            visitorTypeChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: typeNames, top: 5, textStyle: { color: '#94a3b8' } },
                grid: { left: '3%', right: '4%', bottom: '3%', top: 40, containLabel: true },
                xAxis: { type: 'category', data: visitorNames, axisLabel: { color: '#94a3b8' } },
                yAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
                series: stackSeries
            });

            // ===== 图表11: 清洗量/有效量双轴趋势 =====
            dualAxisChart.setOption({
                tooltip: { trigger: 'axis',
                    formatter: function(params) {
                        var s = params[0].axisValue + '<br/>';
                        params.forEach(function(p) {
                            if (p.seriesName === '有效率') s += p.marker + ' ' + p.seriesName + ': ' + p.value + '%<br/>';
                            else s += p.marker + ' ' + p.seriesName + ': ' + p.value + '<br/>';
                        });
                        return s;
                    }
                },
                legend: { data: ['清洗量', '有效量', '有效率'], top: 5, textStyle: { color: '#94a3b8' } },
                grid: { left: '3%', right: '4%', bottom: '3%', top: 40, containLabel: true },
                xAxis: { type: 'category', data: summary.daily_data.map(function(d){return d['日期'].substring(5);}), axisLabel: { color: '#94a3b8', rotate: 30 } },
                yAxis: [
                    { type: 'value', name: '数量', axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.06)' } } },
                    { type: 'value', name: '有效率', axisLabel: { color: '#94a3b8', formatter: '{value}%' }, splitLine: { show: false } }
                ],
                series: [
                    {
                        name: '清洗量', type: 'bar', barWidth: '25%',
                        data: summary.daily_data.map(function(d){return d['清洗量'];}),
                        itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#818cf8'}, {offset: 1, color: '#4f46e5'}]), borderRadius: [4,4,0,0] }
                    },
                    {
                        name: '有效量', type: 'bar', barWidth: '25%',
                        data: summary.daily_data.map(function(d){return d['有效量'];}),
                        itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#34d399'}, {offset: 1, color: '#10b981'}]), borderRadius: [4,4,0,0] }
                    },
                    {
                        name: '有效率', type: 'line', yAxisIndex: 1, smooth: true,
                        data: summary.daily_data.map(function(d){return d['有效率'];}),
                        lineStyle: { color: '#fbbf24', width: 2.5 },
                        itemStyle: { color: '#fbbf24' }, symbol: 'circle', symbolSize: 6
                    }
                ]
            });
        }

        function updateBrandDetail(summary, brandFilter) {
            var brands = brandFilter === 'all' ? ['美的', '小天鹅', 'COLMO', '东芝'] : [brandFilter];
            var colors = {'美的': '#3b82f6', '小天鹅': '#06b6d4', 'COLMO': '#8b5cf6', '东芝': '#f472b6'};
            
            var html = '';
            brands.forEach(function(brand) {
                var data = summary.brand_customer_cross[brand] || {};
                var total = Object.values(data).reduce(function(a, b){return a+b}, 0);
                html +=
                    '<div class="brand-card">' +
                        '<h4 style="color:' + colors[brand] + '">' + brand + '</h4>' +
                        '<div class="brand-stats">' +
                            '<div class="brand-stat-item"><span class="brand-stat-label">总计</span><span class="brand-stat-value">' + total.toLocaleString() + '</span></div>' +
                            '<div class="brand-stat-item"><span class="brand-stat-label">客服卡片</span><span class="brand-stat-value">' + ((data['客服卡片']||0)).toLocaleString() + '</span></div>' +
                            '<div class="brand-stat-item"><span class="brand-stat-label">家享联盟</span><span class="brand-stat-value">' + ((data['家享联盟']||0)).toLocaleString() + '</span></div>' +
                            '<div class="brand-stat-item"><span class="brand-stat-label">智投线索通</span><span class="brand-stat-value">' + ((data['智投线索通']||0)).toLocaleString() + '</span></div>' +
                            '<div class="brand-stat-item"><span class="brand-stat-label">其他</span><span class="brand-stat-value">' + ((data['其他']||0)).toLocaleString() + '</span></div>' +
                        '</div>' +
                    '</div>';
            });
            document.getElementById('brandDetailGrid').innerHTML = html;
        }

        function updateVisitorTable(summary) {
            // === 计算汇总数据 ===
            var totalCalls = 0, totalClean = 0, totalValid = 0;
            Object.values(summary.visitor_calls || {}).forEach(function(v){totalCalls += v;});
            Object.values(summary.visitor_clean || {}).forEach(function(v){totalClean += v;});
            Object.values(summary.visitor_valid || {}).forEach(function(v){totalValid += v;});
            var totalRate = totalClean > 0 ? (totalValid / totalClean * 100).toFixed(1) : '0.0';

            // 按类型汇总（从所有客服的数据累加）
            var sumCardC=0, sumCardCl=0, sumCardV=0;
            var sumJxC=0, sumJxCl=0, sumJxV=0;
            var sumOthC=0, sumOthCl=0, sumOthV=0;
            Object.values(summary.visitor_type_detail || {}).forEach(function(v){
                sumCardC += (v['客服卡片']||0);
                sumJxC   += (v['家享联盟']||0);
                sumOthC += (v['智投线索通']||0)+(v['其他']||0);
            });
            Object.values(summary.visitor_type_clean || {}).forEach(function(v){
                sumCardCl += (v['客服卡片']||0);
                sumJxCl  += (v['家享联盟']||0);
                sumOthCl += (v['智投线索通']||0)+(v['其他']||0);
            });
            Object.values(summary.visitor_type_valid || {}).forEach(function(v){
                sumCardV += (v['客服卡片']||0);
                sumJxV  += (v['家享联盟']||0);
                sumOthV += (v['智投线索通']||0)+(v['其他']||0);
            });

            // 按电话量降序排列
            var sorted = Object.entries(summary.visitor_calls || summary.visitor_stats).sort(function(a, b){return b[1]-a[1]});

            var html = '<div class="visitor-cards">';
            // === 汇总卡片（所有客服合计）===
            html += '<div class="visitor-card summary-total-card">' +
                '<div class="visitor-header">' +
                    '<span class="visitor-rank" style="background:linear-gradient(135deg,#6366f1,#a78bfa);color:#fff;font-size:14px;width:36px;height:36px;">总</span>' +
                    '<span class="visitor-name">📊 客服汇总</span>' +
                '</div>' +
                '<div class="visitor-summary-bar" style="background:linear-gradient(90deg,rgba(99,102,241,0.12) 0%,rgba(167,139,250,0.08) 100%);border:1px solid rgba(99,102,241,0.2);">' +
                    '<span class="sum-item">电话: <b style="color:#60a5fa">' + totalCalls.toLocaleString() + '</b></span>' +
                    '<span class="sum-item">清洗: <b style="color:#f472b6">' + totalClean.toLocaleString() + '</b></span>' +
                    '<span class="sum-item">有效: <b style="color:#34d399">' + totalValid.toLocaleString() + '</b></span>' +
                    '<span class="sum-rate">' + totalRate + '%</span>' +
                '</div>' +
                '<div class="visitor-types">' +
                    '<div class="type-row card">' +
                        '<span class="type-label">📋 客服卡片</span>' +
                        '<span class="type-stats"><b>' + sumCardC + '</b> / <b>' + sumCardCl + '</b> / <b>' + sumCardV + '</b>' +
                        '<span class="type-rate" style="color:' + (sumCardCl>0?(sumCardV/sumCardCl*100>=50?'#34d399':'#fbbf24'):'#94a3b8') + '">' + (sumCardCl>0?(sumCardV/sumCardCl*100).toFixed(1):'0.0') + '%</span>' +
                    '</div>' +
                    '<div class="type-row jx">' +
                        '<span class="type-label">🤝 家享联盟</span>' +
                        '<span class="type-stats"><b>' + sumJxC + '</b> / <b>' + sumJxCl + '</b> / <b>' + sumJxV + '</b>' +
                        '<span class="type-rate" style="color:' + (sumJxCl>0?(sumJxV/sumJxCl*100>=20?'#34d399':'#fbbf24'):'#94a3b8') + '">' + (sumJxCl>0?(sumJxV/sumJxCl*100).toFixed(1):'0.0') + '%</span>' +
                    '</div>' +
                    '<div class="type-row other">' +
                        '<span class="type-label">📦 其他</span>' +
                        '<span class="type-stats"><b>' + sumOthC + '</b> / <b>' + sumOthCl + '</b> / <b>' + sumOthV + '</b>' +
                        '<span class="type-rate" style="color:' + (sumOthCl>0?(sumOthV/sumOthCl*100>=40?'#34d399':'#fbbf24'):'#94a3b8') + '">' + (sumOthCl>0?(sumOthV/sumOthCl*100).toFixed(1):'0.0') + '%</span>' +
                    '</div>' +
                '</div>' +
            '</div>';

            sorted.forEach(function(item, idx) {
                var name = item[0];
                var calls = (summary.visitor_calls && summary.visitor_calls[name]) || 0;
                var clean = (summary.visitor_clean && summary.visitor_clean[name]) || 0;
                var valid = (summary.visitor_valid && summary.visitor_valid[name]) || 0;
                var totalRate = clean > 0 ? (valid / clean * 100).toFixed(1) : '0.0';
                
                // 按客资类型拆分
                var td = (summary.visitor_type_detail && summary.visitor_type_detail[name]) || {};
                var tcl = (summary.visitor_type_clean && summary.visitor_type_clean[name]) || {};
                var tvl = (summary.visitor_type_valid && summary.visitor_type_valid[name]) || {};
                
                // 客服卡片数据
                var cardC = td['客服卡片'] || 0;
                var cardCl = tcl['客服卡片'] || 0;
                var cardV = tvl['客服卡片'] || 0;
                var cardR = cardCl > 0 ? (cardV / cardCl * 100).toFixed(1) : '0.0';
                
                // 家享联盟数据
                var jxC = td['家享联盟'] || 0;
                var jxCl = tcl['家享联盟'] || 0;
                var jxV = tvl['家享联盟'] || 0;
                var jxR = jxCl > 0 ? (jxV / jxCl * 100).toFixed(1) : '0.0';
                
                // 其他数据
                var otherC = (td['智投线索通'] || 0) + (td['其他'] || 0);
                var otherCl = (tcl['智投线索通'] || 0) + (tcl['其他'] || 0);
                var otherV = (tvl['智投线索通'] || 0) + (tvl['其他'] || 0);
                var otherR = otherCl > 0 ? (otherV / otherCl * 100).toFixed(1) : '0.0';
                
                // 排名颜色
                var rankColor = idx < 3 ? ['#fbbf24', '#94a3b8', '#b45309'][idx] : '#64748b';
                var rankClass = idx < 3 ? ' rank-' + (idx + 1) : '';
                
                html += '<div class="visitor-card' + rankClass + '">' +
                    '<div class="visitor-header">' +
                        '<span class="visitor-rank" style="background:' + rankColor + '">' + (idx+1) + '</span>' +
                        '<span class="visitor-name">' + name + '</span>' +
                    '</div>' +
                    '<div class="visitor-summary-bar">' +
                        '<span class="sum-item">电话: <b>' + calls.toLocaleString() + '</b></span>' +
                        '<span class="sum-item">清洗: <b>' + clean.toLocaleString() + '</b></span>' +
                        '<span class="sum-item">有效: <b>' + valid.toLocaleString() + '</b></span>' +
                        '<span class="sum-rate">' + totalRate + '%</span>' +
                    '</div>' +
                    '<div class="visitor-types">' +
                        // 客服卡片
                        '<div class="type-row card">' +
                            '<span class="type-label">📋 客服卡片</span>' +
                            '<span class="type-stats">' +
                                '<b>' + cardC + '</b> / <b>' + cardCl + '</b> / <b>' + cardV + '</b>' +
                                '<span class="type-rate" style="color:' + (cardR >= 50 ? '#34d399' : '#fbbf24') + '">' + cardR + '%</span>' +
                            '</span>' +
                        '</div>' +
                        // 家享联盟
                        '<div class="type-row jx">' +
                            '<span class="type-label">🤝 家享联盟</span>' +
                            '<span class="type-stats">' +
                                '<b>' + jxC + '</b> / <b>' + jxCl + '</b> / <b>' + jxV + '</b>' +
                                '<span class="type-rate" style="color:' + (jxR >= 20 ? '#34d399' : '#fbbf24') + '">' + jxR + '%</span>' +
                            '</span>' +
                        '</div>' +
                        // 其他
                        '<div class="type-row other">' +
                            '<span class="type-label">📦 其他</span>' +
                            '<span class="type-stats">' +
                                '<b>' + otherC + '</b> / <b>' + otherCl + '</b> / <b>' + otherV + '</b>' +
                                '<span class="type-rate" style="color:' + (otherR >= 40 ? '#34d399' : '#fbbf24') + '">' + otherR + '%</span>' +
                            '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            });
            html += '</div>';
            document.getElementById('visitorTable').innerHTML = html;
        }

        window.addEventListener('resize', function() {
            trendChart && trendChart.resize();
            brandChart && brandChart.resize();
            customerTypeChart && customerTypeChart.resize();
            heatmapChart && heatmapChart.resize();
            visitorChart && visitorChart.resize();
            channelChart && channelChart.resize();
            funnelChart && funnelChart.resize();
            brandTrendChart && brandTrendChart.resize();
            visitorTypeChart && visitorTypeChart.resize();
            dualAxisChart && dualAxisChart.resize();
        });

        init();
    </script>
</body>
</html>
