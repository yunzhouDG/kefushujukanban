<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服清洗数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: #475569;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a2e 100%);
            color: var(--text-primary);
            padding: 24px;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            padding: 32px;
            border-radius: 20px;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            position: relative;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .date-filter {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .date-filter label {
            font-size: 14px;
            opacity: 0.9;
        }
        .date-filter select {
            padding: 10px 16px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            min-width: 140px;
        }
        .date-filter select:hover {
            background: rgba(255,255,255,0.25);
        }
        .date-filter select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .date-filter button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .date-filter button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: var(--accent-blue);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
        }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }
        .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-orange), var(--accent-pink)); }
        .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent-red), var(--accent-orange)); }
        
        .stat-card .number {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .stat-card .label {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .section {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple));
            border-radius: 2px;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        .chart-box {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .chart-container {
            height: 320px;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .data-table th {
            background: var(--bg-primary);
            color: var(--text-secondary);
            padding: 16px;
            text-align: center;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table td {
            padding: 14px 16px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .data-table tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }
        
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-blue { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .tag-pink { background: rgba(236, 72, 153, 0.2); color: #f472b6; }
        .tag-cyan { background: rgba(6, 182, 212, 0.2); color: #22d3ee; }
        .tag-green { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        
        .brand-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
        }
        
        .highlight {
            color: var(--accent-cyan);
            font-size: 16px;
        }
        
        .total-row td {
            background: var(--bg-primary) !important;
            font-weight: 700;
            color: var(--accent-cyan);
        }
        
        .rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 13px;
        }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        .rank-other { background: var(--bg-card); color: var(--text-secondary); }
        
        .progress-bar {
            width: 200px;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .mini-bar {
            width: 150px;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            overflow: hidden;
        }
        .mini-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
            border-radius: 3px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-valid {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-invalid {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .brand-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 16px;
        }
        .brand-detail-grid .summary-table {
            grid-column: 1 / 3;
        }
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .brand-detail-grid { grid-template-columns: 1fr; }
            .brand-detail-grid .summary-table { grid-column: 1; }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            body { padding: 16px; }
            .date-filter { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

        // 初始化日期选择器
        function initDatePicker() {
            const dates = dailyData.map(d => d['日期']).sort();
            const startSelect = document.getElementById('startDate');
            const endSelect = document.getElementById('endDate');
            
            dates.forEach(date => {
                startSelect.add(new Option(date, date));
                endSelect.add(new Option(date, date));
            });
            
            startSelect.selectedIndex = 0;
            endSelect.selectedIndex = dates.length - 1;
        }
        
        // 合并日期范围数据
        function mergeData(startDate, endDate) {
            const filtered = dailyData.filter(d => d['日期'] >= startDate && d['日期'] <= endDate);
            
            const summary = {
                total_records: 0,
                unique_customers: 0,
                valid: 0,
                invalid: 0,
                brand_distribution: {},
                customer_type_distribution: {},
                brand_customer_cross: {},
                visitor_stats: {},
                result_stats: {}
            };
            
            // 初始化交叉统计结构（包含5个品牌）
            ['美的', '小天鹅', 'COLMO', '东芝', '其他'].forEach(brand => {
                summary.brand_customer_cross[brand] = {};
                ['客服卡片', '家享联盟', '智投线索通', '其他'].forEach(t => {
                    summary.brand_customer_cross[brand][t] = 0;
                });
            });
            
            filtered.forEach(day => {
                summary.total_records += day['总记录'];
                summary.unique_customers += day['独立客户'];
                summary.valid += day['有效'];
                summary.invalid += day['无效'];
                
                // 合并品牌分布
                Object.entries(day['品牌分布'] || {}).forEach(([k, v]) => {
                    summary.brand_distribution[k] = (summary.brand_distribution[k] || 0) + v;
                });
                
                // 合并客资类型分布
                Object.entries(day['客资类型分布'] || {}).forEach(([k, v]) => {
                    summary.customer_type_distribution[k] = (summary.customer_type_distribution[k] || 0) + v;
                });
                
                // 合并交叉统计
                Object.entries(day['交叉统计'] || {}).forEach(([brand, types]) => {
                    if (!summary.brand_customer_cross[brand]) {
                        summary.brand_customer_cross[brand] = {};
                        ['客服卡片', '家享联盟', '智投线索通', '其他'].forEach(t => {
                            summary.brand_customer_cross[brand][t] = 0;
                        });

                Object.entries(day['回访结果'] || {}).forEach(([k, v]) => {
                    summary.result_stats[k] = (summary.result_stats[k] || 0) + v;
                });
            });
            
            return summary;

                html += `<tr><td><span class="rank ${rankClass}">${idx + 1}</span></td><td><strong>${name}</strong></td><td>${count.toLocaleString()}</td><td>${pct}%</td><td><div class="progress-bar"><div class="progress-fill" style="width:${progressWidth}px"></div></div></td></tr>`;
            });
            
            html += '</tbody></table></div>';
            return html;
        }
        
        // 生成回访结果表格
        function generateResultTable(summary) {
            const sorted = Object.entries(summary.result_stats).sort((a, b) => b[1] - a[1]);
            const total = Object.values(summary.result_stats).reduce((a, b) => a + b, 0);
            const maxCount = Math.max(...Object.values(summary.result_stats));
            const validResults = ['转商机', '新线索', '待再次沟通'];
            
            let html = '<div class="table-container"><table class="data-table"><thead><tr><th>回访结果</th><th>数量</th><th>占比</th><th>可视化</th></tr></thead><tbody>';
            
            sorted.forEach(([result, count]) => {
                const pct = (count / total * 100).toFixed(1);
                const barWidth = (count / maxCount * 150).toFixed(0);
                const isValid = validResults.some(r => result.includes(r));
                const statusClass = isValid ? 'status-valid' : 'status-invalid';
                html += `<tr><td><span class="status-badge ${statusClass}">${result}</span></td><td>${count.toLocaleString()}</td><td>${pct}%</td><td><div class="mini-bar"><div class="mini-fill" style="width:${barWidth}px"></div></div></td></tr>`;
            });
            
            html += '</tbody></table></div>';
            return html;
        }
        
        // 更新图表
        function updateCharts(summary) {
            // 品牌饼图
            const brandChart = echarts.init(document.getElementById('brandChart'));
            brandChart.setOption({
                backgroundColor: 'transparent',
                title: { text: '品牌分布', left: 'center', textStyle: { color: '#f8fafc', fontSize: 18, fontWeight: 'bold' } },
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)', backgroundColor: 'rgba(30, 41, 59, 0.9)', borderColor: '#475569', textStyle: { color: '#f8fafc' } },
                legend: { bottom: '5%', textStyle: { color: '#94a3b8' } },
                series: [{
                    type: 'pie', radius: ['45%', '75%'], center: ['50%', '45%'],
                    itemStyle: { borderRadius: 10, borderColor: '#0f172a', borderWidth: 3 },
                    label: { show: true, formatter: '{b}: {c}', color: '#f8fafc', fontSize: 13 },
                    labelLine: { lineStyle: { color: '#475569' } },
                    data: Object.entries(summary.brand_distribution).map(([name, value]) => ({
                        name, value, itemStyle: { color: BRAND_COLORS[name] || '#888' }
                    }))
                }]
            });
            
            // 客资类型饼图
            const typeColors = {'客服卡片': '#667eea', '家享联盟': '#f093fb', '智投线索通': '#4facfe', '其他': '#43e97b'};
            const customerTypeChart = echarts.init(document.getElementById('customerTypeChart'));
            customerTypeChart.setOption({
                backgroundColor: 'transparent',
                title: { text: '客资类型分布', left: 'center', textStyle: { color: '#f8fafc', fontSize: 18, fontWeight: 'bold' } },
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)', backgroundColor: 'rgba(30, 41, 59, 0.9)', borderColor: '#475569', textStyle: { color: '#f8fafc' } },
                legend: { bottom: '5%', textStyle: { color: '#94a3b8' } },
                series: [{
                    type: 'pie', radius: ['45%', '75%'], center: ['50%', '45%'],
                    itemStyle: { borderRadius: 10, borderColor: '#0f172a', borderWidth: 3 },
                    label: { show: true, formatter: '{b}: {c}', color: '#f8fafc', fontSize: 13 },
                    labelLine: { lineStyle: { color: '#475569' } },
                    data: Object.entries(summary.customer_type_distribution).map(([name, value]) => ({
                        name, value, itemStyle: { color: typeColors[name] || '#888' }
                    }))
                }]
            });
            
            // 回访人柱状图
            const visitorChart = echarts.init(document.getElementById('visitorChart'));
            const visitorEntries = Object.entries(summary.visitor_stats).sort((a, b) => b[1] - a[1]);
            visitorChart.setOption({
                backgroundColor: 'transparent',
                title: { text: '回访人处理量', left: 'center', textStyle: { color: '#f8fafc', fontSize: 18, fontWeight: 'bold' } },
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(30, 41, 59, 0.9)', borderColor: '#475569', textStyle: { color: '#f8fafc' } },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
                xAxis: { type: 'category', data: visitorEntries.map(e => e[0]), axisLabel: { rotate: 30, color: '#94a3b8' }, axisLine: { lineStyle: { color: '#475569' } } },
                yAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#475569' } }, splitLine: { lineStyle: { color: '#334155' } } },
                series: [{
                    data: visitorEntries.map(e => e[1]), type: 'bar', barWidth: '60%',
                    itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#667eea'}, {offset: 1, color: '#764ba2'}]), borderRadius: [8, 8, 0, 0] },
                    label: { show: true, position: 'top', color: '#f8fafc', fontWeight: 'bold' }
                }]
            });
            
            // 回访结果柱状图
            const resultChart = echarts.init(document.getElementById('resultChart'));
            const resultEntries = Object.entries(summary.result_stats).sort((a, b) => b[1] - a[1]);
            resultChart.setOption({
                backgroundColor: 'transparent',
                title: { text: '回访结果分布', left: 'center', textStyle: { color: '#f8fafc', fontSize: 18, fontWeight: 'bold' } },
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(30, 41, 59, 0.9)', borderColor: '#475569', textStyle: { color: '#f8fafc' } },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
                xAxis: { type: 'category', data: resultEntries.map(e => e[0]), axisLabel: { rotate: 35, color: '#94a3b8', fontSize: 11 }, axisLine: { lineStyle: { color: '#475569' } } },
                yAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#475569' } }, splitLine: { lineStyle: { color: '#334155' } } },
                series: [{
                    data: resultEntries.map(e => e[1]), type: 'bar', barWidth: '60%',
                    itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: '#f093fb'}, {offset: 1, color: '#f5576c'}]), borderRadius: [8, 8, 0, 0] },
                    label: { show: true, position: 'top', color: '#f8fafc', fontWeight: 'bold', fontSize: 11 }
                }]
            });
        }
        
        // 应用筛选
        function applyFilter() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const summary = mergeData(startDate, endDate);
            
            updateStats(summary);
            document.getElementById('crossTable').innerHTML = generateCrossTable(summary);
            document.getElementById('visitorTable').innerHTML = generateVisitorTable(summary);
            document.getElementById('resultTable').innerHTML = generateResultTable(summary);
            updateCharts(summary);
        }
        
        // 重置筛选
        function resetFilter() {
            const dates = dailyData.map(d => d['日期']).sort();
            document.getElementById('startDate').selectedIndex = 0;
            document.getElementById('endDate').selectedIndex = dates.length - 1;
            applyFilter();
        }
        
        // 初始化
        window.onload = function() {
            initDatePicker();
            applyFilter();
        };
        
        // 响应式
        window.addEventListener('resize', function() {
            echarts.getInstanceByDom(document.getElementById('brandChart'))?.resize();
            echarts.getInstanceByDom(document.getElementById('customerTypeChart'))?.resize();
            echarts.getInstanceByDom(document.getElementById('visitorChart'))?.resize();
            echarts.getInstanceByDom(document.getElementById('resultChart'))?.resize();
        });
    </script>
</body>
</html>
